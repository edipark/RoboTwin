# Basic experiment configuration (keep unchanged)
policy_name: null
task_name: null
task_config: null
ckpt_setting: null
seed: null
instruction_type: unseen

# Soft-VLA parameters
# Name of the TrainConfig registered in src/openpi/training/config.py.
# Use "softvla_robotwin" for RoboTwin evaluation.
train_config_name: null

# Checkpoint experiment name (directory under train_config_name/).
model_name: null

# Checkpoint step to load. Override via eval.sh <checkpoint_id> argument.
checkpoint_id: 30000

# Number of actions to execute per inference call (action chunk execution length).
# This is like pi0_step in PI0: get_action()[:softvla_step].
# Should be <= action_horizon (model default: 16).
softvla_step: 16

# Number of flow-matching ODE integration steps for action generation.
# Higher = better quality actions but slower inference. Separate from softvla_step.
num_denoise_steps: 10

# Embodiment index for the SoftPromptHub (0 = first registered robot).
domain_id: 0
